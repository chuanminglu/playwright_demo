name: AI Code Review with DeepSeek

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**.js'
      - '**.ts'
      - '**.jsx'
      - '**.tsx'
      - '**.py'
      - '**.java'
      - '**.go'

jobs:
  deepseek-review:
    name: DeepSeek AI Code Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    permissions:
      pull-requests: write
      contents: read
      issues: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Get code changes
        id: get-changes
        run: |
          set -e
          echo "Analyzing code changes..."
          
          git diff --name-only origin/${{ github.event.pull_request.base.ref }} HEAD > changed_files.txt || true
          
          if [ -f changed_files.txt ]; then
            grep -E '\.(js|ts|jsx|tsx|py|java|go)$' changed_files.txt > code_files.txt || echo "" > code_files.txt
          else
            echo "" > code_files.txt
          fi
          
          FILE_COUNT=$(wc -l < code_files.txt 2>/dev/null | tr -d ' ' || echo "0")
          echo "files_changed=${FILE_COUNT}" >> "$GITHUB_OUTPUT"
          
          if [ "${FILE_COUNT}" != "0" ] && [ -s code_files.txt ]; then
            git diff origin/${{ github.event.pull_request.base.ref }} HEAD -- $(cat code_files.txt) > full_diff.txt || echo "" > full_diff.txt
            DIFF_SIZE=$(wc -c < full_diff.txt 2>/dev/null | tr -d ' ' || echo "0")
            echo "diff_size=${DIFF_SIZE}" >> "$GITHUB_OUTPUT"
            
            if [ "${DIFF_SIZE}" -gt 50000 ]; then
              head -c 50000 full_diff.txt > diff_truncated.txt
              echo "" >> diff_truncated.txt
              echo "... (diff truncated due to size limit)" >> diff_truncated.txt
              mv diff_truncated.txt full_diff.txt
            fi
          else
            echo "diff_size=0" >> "$GITHUB_OUTPUT"
            echo "" > full_diff.txt
          fi
          
          echo "Found ${FILE_COUNT} code files changed"

      - name: DeepSeek AI Review
        if: steps.get-changes.outputs.diff_size != '0'
        id: ai-review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        shell: python
        run: |
          import os
          import sys
          import json
          import urllib.request

          def call_deepseek_api(diff_content):
              api_key = os.environ.get('DEEPSEEK_API_KEY')
              if not api_key:
                  print("ERROR: DEEPSEEK_API_KEY not configured")
                  sys.exit(1)
              
              system_msg = """你是一位拥有15年经验的资深代码审查专家。
          请重点关注：代码缺陷、安全性、性能、代码质量、最佳实践和测试覆盖率。
          请使用中文回答。将问题按优先级分类（高/中/低）。提供具体出错行号和修复建议代码。"""
              
              user_msg = f"请审查以下 diff 内容:\n\n```diff\n{diff_content}\n```\n\n请提供详细的审查报告。"
              
              url = "https://api.deepseek.com/v1/chat/completions"
              headers = {
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json"
              }
              
              payload = {
                  "model": "deepseek-coder",
                  "messages": [
                      {"role": "system", "content": system_msg},
                      {"role": "user", "content": user_msg}
                  ],
                  "temperature": 0.3,
                  "max_tokens": 4000
              }
              
              try:
                  req = urllib.request.Request(
                      url,
                      data=json.dumps(payload).encode('utf-8'),
                      headers=headers,
                      method='POST'
                  )
                  
                  with urllib.request.urlopen(req, timeout=120) as response:
                      result = json.loads(response.read().decode('utf-8'))
                      if 'choices' in result and result['choices']:
                          return result['choices'][0]['message']['content']
                      else:
                          print("ERROR: Invalid response")
                          sys.exit(1)
                          
              except Exception as e:
                  print(f"ERROR: {e}")
                  sys.exit(1)

          if not os.path.exists('full_diff.txt'):
              print("ERROR: full_diff.txt not found")
              sys.exit(1)

          with open('full_diff.txt', 'r', encoding='utf-8', errors='ignore') as f:
              diff_content = f.read()

          if not diff_content.strip():
              with open('review_result.md', 'w', encoding='utf-8') as f:
                  f.write("No code changes found.")
              sys.exit(0)

          print(f"Diff size: {len(diff_content)} chars")
          review_result = call_deepseek_api(diff_content)

          with open('review_result.md', 'w', encoding='utf-8') as f:
              f.write(review_result)

          print("Review completed")

      - name: Post review comment to PR
        if: steps.ai-review.outcome == 'success' && hashFiles('review_result.md') != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            
            try {
              const reviewContent = fs.readFileSync('review_result.md', 'utf8');
              
              const comment = `## 🤖 DeepSeek AI Code Review
              
            ${reviewContent}
            
            ---
            *🔍 Powered by DeepSeek AI | ⏰ ${new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' })}*`;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
              
              console.log('✅ Review comment posted successfully');
            } catch (error) {
              console.error('❌ Failed to post review comment:', error);
              throw error;
            }

      - name: Generate review summary
        if: always()
        run: |
          echo "## 🎯 AI代码审查摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **变更文件数**: ${{ steps.get-changes.outputs.files_changed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **审查状态**: ${{ steps.ai-review.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- **审查时间**: $(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f review_result.md ]; then
            echo "### 📝 审查结果预览" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            head -n 50 review_result.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload review report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-review-report-${{ github.event.pull_request.number }}
          path: |
            review_result.md
            full_diff.txt
            changed_files.txt
          retention-days: 30
